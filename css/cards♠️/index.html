<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  ><h1>Cards</h1>
  <main id="playing-cards">
    <div class="card flowers">
      <div class="left">
        <h2 class="top">A</h2>
        <h2 class="top">♣</h2>
      </div>
      <div class="middle">
        <h2 class="middle-symbol">♣</h2>
      </div>
      <div class="right">
        <h2 class="bottom">♣</h2>
        <h2 class="bottom">A</h2>
      </div>
    </div>
    <div class="card diamond">
      <div class="left">
        <h2 class="top">A</h2>
        <h2 class="top">♦</h2>
      </div>
      <div class="middle">
        <h2 class="middle-symbol">♦</h2>
      </div>
      <div class="right">
        <h2 class="bottom">♦</h2>
        <h2 class="bottom">A</h2>
      </div>
    </div>
    <div class="card spear">
      <div class="left">
        <h2 class="top">A</h2>
        <h2 class="top">♠</h2>
      </div>
      <div class="middle">
        <h2 class="middle-symbol">♠</h2>
        </div>
      <div class="right">
        <h2 class="bottom">♠</h2>
        <h2 class="bottom">A</h2>
      </div>
    </div>
    <div class="card heart">
      <div class="left">
        <h2 class="top">A</h2>
        <h2 class="top">♥</h2>
      </div>
      <div class="middle">
        <h2 class="middle-symbol">♥</h2>
        </div>
      <div class="right">
        <h2 class="bottom">♥</h2>
        <h2 class="bottom">A</h2>
      </div>
    </div>
    
    <div class="card flower">
      <div class="left">
        <h2 class="top">4</h2>
        <h2 class="top">♣</h2>
      </div>
      <div class="middle">
        <div class="number-stack">
          <h2 class="middle-symbol">♣</h2>
          <h2 class="middle-symbol">♣</h2>
          <h2 class="middle-symbol bottom">♣</h2>
          <h2 class="middle-symbol bottom">♣</h2>
        </div>
      </div>
      <div class="right">
        <h2 class="bottom">♣</h2>
        <h2 class="bottom">4</h2>
      </div>
    </div>

    <div class="card diamond">
      <div class="left">
        <h2 class="top">10</h2>
        <h2 class="top">♦</h2>
      </div>
      <div class="middle">
        <div class="number-stack">
          <h2 class="middle-symbol">♦</h2>
          <h2 class="middle-symbol">♦</h2>
          <h2 class="middle-symbol">♦</h2>
          <h2 class="middle-symbol " >♦</h2>
          <h2 class="middle-symbol ">♦</h2>
          <h2 class="middle-symbol ">♦</h2>
          <h2 class="middle-symbol ">♦</h2>
          <h2 class="middle-symbol ">♦</h2>
          <h2 class="middle-symbol ">♦</h2>
          <h2 class="middle-symbol ">♦</h2>
        </div>
      </div>
      <div class="right">
        <h2 class="bottom">♣</h2>
        <h2 class="bottom">10</h2>
      </div>
    </div>
  </main>
</body>

</html>
